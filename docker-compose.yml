version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"  
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - chat-net

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 20s
      retries: 10
    networks:
      - chat-net

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - chat-net

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    image: hoangnguyen1007/gateway-service:${IMAGE_TAG:-latest}
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:8081
      - SERVER_SERVICE_URL=http://server-service:8085
      - CHANNEL_SERVICE_URL=http://channel-service:8086
      - MESSAGING_SERVICE_URL=http://messaging-service:8082
      - MESSAGING_WS_URL=ws://messaging-service:8082
      - PRESENCE_SERVICE_URL=http://presence-service:8083
      - FILE_SERVICE_URL=http://file-service:8089
      - LOG_SERVICE_URL=http://log-service:8084
      - NOTIFICATION_SERVICE_URL=http://notification-service:8088
      - ROLE_SERVICE_URL=http://role-service:8091
      - USER_PROFILE_URL=http://user-profile-service:8090
      - FRIEND_SERVICE_URL=http://friend-service:8092
    depends_on:
      auth-service:
        condition: service_started
      messaging-service:
        condition: service_started
    networks:
      - chat-net

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    image: hoangnguyen1007/auth-service:${IMAGE_TAG:-latest}
    container_name: auth-service
    networks:
      - chat-net
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/chat_auth_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_DRIVER=com.mysql.cj.jdbc.Driver
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_JPA_DDL_AUTO=update
    depends_on:
      mysql-db:
        condition: service_healthy

  server-service:
    build:
      context: .
      dockerfile: server-service/Dockerfile
    image: hoangnguyen1007/server-service:${IMAGE_TAG:-latest}
    container_name: server-service
    networks:
      - chat-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/chat_server_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MySQL8Dialect
      - CHANNEL_SERVICE_URL=http://channel-service:8086
      - ROLE_SERVICE_URL=http://role-service:8091
    depends_on:
      mysql-db:
        condition: service_healthy
      channel-service:
        condition: service_started

  channel-service:
    build:
      context: .
      dockerfile: channel-service/Dockerfile
    image: hoangnguyen1007/channel-service:${IMAGE_TAG:-latest}
    container_name: channel-service
    networks:
      - chat-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/chat_channel_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - ROLE_SERVICE_URL=http://role-service:8091
    depends_on:
      mysql-db:
        condition: service_healthy

  messaging-service:
    build:
      context: .
      dockerfile: messaging-service/Dockerfile
    image: hoangnguyen1007/messaging-service:${IMAGE_TAG:-latest}
    container_name: messaging-service
    networks:
      - chat-net
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_DEFAULT_USER}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_DEFAULT_PASS}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/chat_messaging_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - AUTH_SERVICE_URL=http://auth-service:8081
      - PRESENCE_SERVICE_URL=http://presence-service:8083
      - SERVER_SERVICE_URL=http://server-service:8085
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql-db:
        condition: service_healthy

  presence-service:
    build:
      context: .
      dockerfile: presence-service/Dockerfile
    image: hoangnguyen1007/presence-service:${IMAGE_TAG:-latest}
    container_name: presence-service
    networks:
      - chat-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/chat_presence_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql-db:
        condition: service_healthy

  log-service:
    build:
      context: .
      dockerfile: log-service/Dockerfile
    image: hoangnguyen1007/log-service:${IMAGE_TAG:-latest}
    container_name: log-service
    networks:
      - chat-net
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_DEFAULT_USER}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_DEFAULT_PASS}
    volumes:
      - log-data:/app/logs
    depends_on:
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    image: hoangnguyen1007/notification-service:${IMAGE_TAG:-latest}
    container_name: notification-service
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_DEFAULT_USER}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_DEFAULT_PASS}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/chat_notification_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_DRIVER=com.mysql.cj.jdbc.Driver
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_JPA_DDL_AUTO=update
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql-db:
        condition: service_healthy
    networks:
      - chat-net

  file-service:
    build:
      context: .
      dockerfile: file-service/Dockerfile
    image: hoangnguyen1007/file-service:${IMAGE_TAG:-latest}
    container_name: file-service
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/chat_file_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_DRIVER=com.mysql.cj.jdbc.Driver
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_JPA_DDL_AUTO=update
    depends_on:
      minio:
        condition: service_healthy
      mysql-db:
        condition: service_healthy
    networks:
      - chat-net

  role-service:
    build:
      context: .
      dockerfile: role-service/Dockerfile
    image: hoangnguyen1007/role-service:${IMAGE_TAG:-latest}
    container_name: role-service
    networks:
      - chat-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/chat_role_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_DRIVER=com.mysql.cj.jdbc.Driver
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_JPA_DDL_AUTO=update
      - SERVER_SERVICE_URL=http://server-service:8085
    depends_on:
      mysql-db:
        condition: service_healthy

  user-profile-service:
    build:
      context: .
      dockerfile: user-profile-service/Dockerfile
    image: hoangnguyen1007/user-profile-service:${IMAGE_TAG:-latest}
    container_name: user-profile-service
    networks:
      - chat-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/chat_profile_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_DRIVER=com.mysql.cj.jdbc.Driver
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_JPA_DDL_AUTO=update
    depends_on:
      mysql-db:
        condition: service_healthy

  friend-service:
    build:
      context: .
      dockerfile: friend-service/Dockerfile
    image: hoangnguyen1007/friend-service:${IMAGE_TAG:-latest}
    container_name: friend-service
    networks:
      - chat-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/chat_friend_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_DRIVER=com.mysql.cj.jdbc.Driver
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_JPA_DDL_AUTO=update
      - USER_PROFILE_URL=http://user-profile-service:8090
    depends_on:
      mysql-db:
        condition: service_healthy

networks:
  chat-net:
    driver: bridge

volumes:
  mysql-data:
  minio-data:
  rabbitmq-data:
  log-data:
