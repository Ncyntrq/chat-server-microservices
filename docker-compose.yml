# Stack tối thiểu cho Phase 1 (Người A): RabbitMQ + log-service.
# Khi các service khác (auth/messaging/presence/gateway) sẵn sàng, team thêm vào đây.

services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: chat-rabbitmq
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chat-net

  log-service:
    build:
      context: .
      dockerfile: log-service/Dockerfile
    image: chatsever/log-service:1.0.0-SNAPSHOT
    container_name: chat-log-service
    ports:
      - "8084:8084"
    environment:
      # Override application.yml — Spring Boot tự map SPRING_RABBITMQ_HOST → spring.rabbitmq.host
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      # Persist file log ra host để debug
      - ./log-service/logs:/app/logs
    networks:
      - chat-net

networks:
  chat-net:
    driver: bridge
