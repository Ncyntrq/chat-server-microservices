version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    user: root
    ports:
      - "9090:8080"
      - "50000:50000"
    volumes:
      - jenkins-home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
    environment:
      - JAVA_OPTS=-Xmx1024m -Xms512m
    networks:
      - devops-net
      - chat-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/login" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    ports:
      - "9002:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonar-db:5432/${SONAR_DB_NAME}
      - SONAR_JDBC_USERNAME=${SONAR_DB_USER}
      - SONAR_JDBC_PASSWORD=${SONAR_DB_PASSWORD}
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
      - SONAR_WEB_JAVAOPTS=-Xmx1024m -Xms512m
      - SONAR_CE_JAVAOPTS=-Xmx1024m -Xms256m
      - SONAR_SEARCH_JAVAOPTS=-Xmx1024m -Xms512m
    volumes:
      - sonar-data:/opt/sonarqube/data
      - sonar-logs:/opt/sonarqube/logs
      - sonar-extensions:/opt/sonarqube/extensions
    depends_on:
      sonar-db:
        condition: service_healthy
    networks:
      - devops-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/api/system/status" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  sonar-db:
    image: postgres:15-alpine
    container_name: sonar-db
    environment:
      - POSTGRES_DB=${SONAR_DB_NAME}
      - POSTGRES_USER=${SONAR_DB_USER}
      - POSTGRES_PASSWORD=${SONAR_DB_PASSWORD}
    volumes:
      - sonar-db-data:/var/lib/postgresql/data
    networks:
      - devops-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SONAR_DB_USER} -d ${SONAR_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./devops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - devops-net
      - chat-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_ANALYTICS_REPORTING_ENABLED=false
      # Jaeger datasource đã được tích hợp sẵn từ Grafana 10+, không cần cài thêm
    volumes:
      - grafana-data:/var/lib/grafana
      - ./devops/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
    networks:
      - devops-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health" ]
      interval: 15s
      timeout: 5s
      retries: 5

  # ================================================================
  # JAEGER — Distributed Tracing (all-in-one)
  # UI:        http://localhost:16686
  # OTLP HTTP: http://jaeger:4318  (services → Jaeger)
  # OTLP gRPC: http://jaeger:4317
  # ================================================================
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC (optional)
      - "4318:4318"     # OTLP HTTP (Spring Boot services gửi trace về đây)
      - "14268:14268"   # Jaeger HTTP Thrift (legacy)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=50000
      - LOG_LEVEL=warn
    networks:
      - devops-net
      - chat-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:16686/" ]
      interval: 15s
      timeout: 5s
      retries: 5

  # ================================================================
  # GRAFANA LOKI — Log Aggregation
  # API:  http://loki:3100  (Promtail → Loki)
  # Query qua Grafana datasource
  # ================================================================
  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"    # Loki HTTP API (để test trực tiếp nếu cần)
    volumes:
      - ./devops/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - devops-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3100/ready" ]
      interval: 15s
      timeout: 5s
      retries: 10

  # ================================================================
  # PROMTAIL — Docker Log Shipper → Loki
  # Đọc stdout của tất cả containers, parse JSON, ship về Loki
  # Không expose port ra ngoài
  # ================================================================
  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./devops/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro   # Đọc Docker container logs
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - devops-net
      - chat-net
    user: root   # Cần root để đọc Docker socket và container logs


networks:
  devops-net:
    driver: bridge
    name: devops-net
  chat-net:
    external: true
    name: chat-server-microservices_chat-net

volumes:
  jenkins-home:
  sonar-data:
  sonar-logs:
  sonar-extensions:
  sonar-db-data:
  prometheus-data:
  grafana-data:
  loki-data:       # Lưu trữ logs của Grafana Loki
